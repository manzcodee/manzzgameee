<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Dungeon Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --ui-bg: rgba(15, 23, 42, 0.85);
            --ui-border: #3b82f6;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'VT323', monospace;
            color: white;
            user-select: none;
            -webkit-user-select: none;
        }
        .pixel-font { font-family: 'Press Start 2P', cursive; }
        
        #gameCanvas {
            display: block;
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 50;
            backdrop-filter: blur(5px);
        }

        .panel {
            background: var(--ui-bg);
            border: 4px solid var(--ui-border);
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }

        .btn {
            background: linear-gradient(to bottom, #3b82f6, #1d4ed8);
            border: 2px solid #60a5fa;
            color: white;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 4px;
            text-shadow: 1px 1px 0 #000;
            transition: all 0.1s;
        }
        .btn:active { transform: scale(0.95); background: #1e3a8a; }
        .btn:disabled { filter: grayscale(1); cursor: not-allowed; }

        input[type="text"] {
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--ui-border);
            color: white;
            padding: 10px;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            outline: none;
            width: 100%;
            border-radius: 4px;
        }

        /* Character Select */
        .char-select {
            border: 4px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.1);
        }
        .char-select.active {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.2);
            box-shadow: 0 0 15px #fbbf24;
        }
        .char-img { height: 120px; image-rendering: pixelated; object-fit: contain; }

        /* HUD */
        #hud { pointer-events: none; }
        .hud-panel { background: rgba(0,0,0,0.6); border: 2px solid #475569; pointer-events: auto; }
        
        .bar-container { width: 200px; height: 20px; background: #333; border: 2px solid #000; position: relative; }
        .bar-fill.hp { background: #ef4444; height: 100%; transition: width 0.2s; }
        .bar-fill.exp { background: #3b82f6; height: 100%; transition: width 0.2s; }
        .bar-text { position: absolute; width: 100%; text-align: center; top: 0; left: 0; font-size: 14px; text-shadow: 1px 1px 0 #000; line-height: 16px;}

        /* Chat */
        #chat-container {
            position: absolute; bottom: 20px; left: 20px; width: 300px; height: 200px;
            display: flex; flex-direction: column; z-index: 40;
        }
        #chat-messages {
            flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.5); padding: 8px;
            border: 2px solid #475569; border-bottom: none; border-radius: 8px 8px 0 0;
            font-size: 1.1rem; text-shadow: 1px 1px 0 #000; pointer-events: auto;
        }
        #chat-input {
            width: 100%; padding: 8px; border: 2px solid #475569; background: rgba(0,0,0,0.8);
            color: white; border-radius: 0 0 8px 8px; font-family: 'VT323'; outline: none; pointer-events: auto;
        }

        /* Skills UI */
        #skills-container {
            position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 40; pointer-events: auto;
        }
        .skill-btn {
            width: 50px; height: 50px; background: rgba(0,0,0,0.7); border: 2px solid #475569;
            border-radius: 8px; position: relative; display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; color: #fbbf24; font-weight: bold; overflow: hidden;
        }
        .skill-cooldown {
            position: absolute; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7);
            height: 0%; transition: height 0.1s linear;
        }
        .skill-key { position: absolute; top: -10px; left: -10px; background: #fff; color: #000; width: 20px; height: 20px; border-radius: 50%; font-size: 12px; display: flex; justify-content: center; align-items: center; font-weight: bold; }

        /* Mobile Joystick */
        #joystick-zone {
            position: absolute; bottom: 20px; left: 20px; width: 150px; height: 150px;
            border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            display: none; z-index: 40; pointer-events: auto;
        }
        #joystick-knob {
            position: absolute; width: 60px; height: 60px; border-radius: 50%;
            background: rgba(255,255,255,0.5); top: 45px; left: 45px; pointer-events: none;
        }
        #mobile-attack {
            position: absolute; bottom: 40px; right: 100px; width: 70px; height: 70px;
            border-radius: 50%; background: rgba(239, 68, 68, 0.5); border: 2px solid rgba(239, 68, 68, 0.8);
            display: none; justify-content: center; align-items: center; font-size: 24px; z-index: 40; pointer-events: auto;
        }

        @media (max-width: 768px) {
            #chat-container { display: none; } /* Hide chat on mobile to save space */
            #joystick-zone, #mobile-attack { display: flex; }
            #skills-container { bottom: 120px; right: 20px; flex-direction: column; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body>

    <!-- Canvas for Game -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Layer -->
    <div id="ui-layer" class="absolute inset-0 pointer-events-none">
        
        <!-- HUD -->
        <div id="hud" class="hidden absolute top-4 left-4 flex flex-col gap-2">
            <div class="hud-panel p-2 rounded flex items-center gap-3">
                <img id="hud-avatar" src="" class="w-10 h-10 object-contain pixelated bg-gray-800 rounded border border-gray-600">
                <div>
                    <div id="hud-name" class="text-xl font-bold text-yellow-400 drop-shadow-md">Player</div>
                    <div class="text-sm text-gray-300">Level <span id="hud-level">1</span></div>
                </div>
            </div>
            <div class="hud-panel p-2 rounded">
                <div class="bar-container mb-1">
                    <div id="hud-hp-fill" class="bar-fill hp" style="width: 100%;"></div>
                    <div id="hud-hp-text" class="bar-text">100/100</div>
                </div>
                <div class="bar-container">
                    <div id="hud-exp-fill" class="bar-fill exp" style="width: 0%;"></div>
                    <div id="hud-exp-text" class="bar-text">EXP: 0/100</div>
                </div>
            </div>
            <div class="hud-panel p-2 rounded text-center">
                <div class="text-sm text-gray-400">Room Code</div>
                <div id="hud-room-code" class="text-xl font-bold text-green-400 tracking-widest">----</div>
            </div>
        </div>

        <!-- Chat -->
        <div id="chat-container" class="hidden">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Tekan Enter untuk chat..." autocomplete="off">
        </div>

        <!-- Skills -->
        <div id="skills-container" class="hidden">
            <div class="skill-btn" id="skill-1"><div class="skill-key">1</div><span id="s1-icon">S</span><div id="cd-1" class="skill-cooldown"></div></div>
            <div class="skill-btn" id="skill-2"><div class="skill-key">2</div><span id="s2-icon">D</span><div id="cd-2" class="skill-cooldown"></div></div>
            <div class="skill-btn" id="skill-3"><div class="skill-key">3</div><span id="s3-icon">U</span><div id="cd-3" class="skill-cooldown"></div></div>
        </div>

        <!-- Mobile Controls -->
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="mobile-attack">⚔️</div>

        <!-- Upgrade Panel -->
        <div id="upgrade-panel" class="hidden overlay">
            <div class="panel text-center w-96">
                <h2 class="text-2xl text-yellow-400 mb-4 pixel-font">LEVEL UP!</h2>
                <p class="mb-4">Pilih skill untuk diupgrade:</p>
                <div class="flex flex-col gap-3">
                    <button class="btn" onclick="game.upgradeSkill(0)">Upgrade Skill 1</button>
                    <button class="btn" onclick="game.upgradeSkill(1)">Upgrade Skill 2</button>
                    <button class="btn" onclick="game.upgradeSkill(2)">Upgrade Skill 3</button>
                    <button class="btn bg-gray-600 border-gray-400" onclick="document.getElementById('upgrade-panel').classList.add('hidden')">Tutup</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Screens -->
    <!-- Loading -->
    <div id="screen-loading" class="overlay">
        <h1 class="text-4xl text-white pixel-font mb-4 animate-pulse">MEMUAT...</h1>
        <p class="text-gray-400">Menyiapkan Dungeon</p>
    </div>

    <!-- Login -->
    <div id="screen-login" class="overlay hidden">
        <div class="panel text-center max-w-md w-full">
            <h1 class="text-3xl text-yellow-400 pixel-font mb-6 drop-shadow-lg">PIXEL DUNGEON</h1>
            <p class="text-gray-300 mb-8 text-lg">Multiplayer RPG Online</p>
            <button id="btn-login" class="btn w-full flex items-center justify-center gap-2 py-3">
                <svg class="w-6 h-6" viewBox="0 0 24 24" fill="white"><path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
                Login dengan Google
            </button>
        </div>
    </div>

    <!-- Lobby -->
    <div id="screen-lobby" class="overlay hidden">
        <div class="panel max-w-2xl w-full flex flex-col items-center">
            <h2 class="text-2xl text-white pixel-font mb-6">Persiapan Karakter</h2>
            
            <div class="w-full mb-6">
                <label class="block text-gray-300 mb-2">Nama Karakter:</label>
                <input type="text" id="input-username" placeholder="Masukkan nama..." maxlength="12">
            </div>

            <p class="text-gray-300 mb-2">Pilih Class:</p>
            <div class="flex gap-6 mb-8">
                <div class="char-select active p-2 flex flex-col items-center" data-char="boy">
                    <img src="https://i.ibb.co.com/7d4SgNtS/b59766b757572f2602678f3e274eacd9-removebg-preview.png" class="char-img">
                    <span class="mt-2 font-bold text-blue-400">Swordsman</span>
                </div>
                <div class="char-select p-2 flex flex-col items-center" data-char="girl">
                    <img src="https://i.ibb.co.com/XxmBdS4t/Avatars-In-Pixels-removebg-preview.png" class="char-img">
                    <span class="mt-2 font-bold text-pink-400">Mage</span>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full border-t border-gray-600 pt-6">
                <div class="flex flex-col gap-2">
                    <h3 class="text-lg text-yellow-400">Buat Dunia Baru</h3>
                    <button id="btn-create-room" class="btn">Buat Room</button>
                </div>
                <div class="flex flex-col gap-2">
                    <h3 class="text-lg text-green-400">Gabung Dunia</h3>
                    <input type="text" id="input-room-code" placeholder="Kode Room (ex: DGN123)" class="text-center uppercase" maxlength="7">
                    <button id="btn-join-room" class="btn bg-green-600 border-green-400">Gabung</button>
                </div>
            </div>
            
            <button id="btn-logout" class="mt-6 text-red-400 underline cursor-pointer text-lg">Logout</button>
        </div>
    </div>

    <!-- Firebase SDKs (Modular v9) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, orderBy, limit, serverTimestamp, getDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBySp5ie_a8xhoxFZWM9KEKWUmyG-7J4CM",
            authDomain: "manzgame-13509.firebaseapp.com",
            projectId: "manzgame-13509",
            storageBucket: "manzgame-13509.firebasestorage.app",
            messagingSenderId: "237567563134",
            appId: "1:237567563134:web:6edd240395f61d09348f2f",
            measurementId: "G-VW27KWRWCW"
        };
        
        // Error handling if config is invalid (to prevent crashing the whole script visually)
        let app, analytics, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            analytics = getAnalytics(app);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            console.error("Firebase Init Error:", e);
            alert("Firebase Configuration invalid. Please add your config in the code.");
        }

        // ==========================================
        // GAME ENGINE & LOGIC
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });

        // Assets
        const ASSETS = {
            boy: new Image(),
            girl: new Image(),
            loaded: 0
        };
        ASSETS.boy.src = 'https://i.ibb.co.com/7d4SgNtS/b59766b757572f2602678f3e274eacd9-removebg-preview.png';
        ASSETS.girl.src = 'https://i.ibb.co.com/XxmBdS4t/Avatars-In-Pixels-removebg-preview.png';

        // Wait for images
        ASSETS.boy.onload = () => { ASSETS.loaded++; checkAssets(); }
        ASSETS.girl.onload = () => { ASSETS.loaded++; checkAssets(); }
        function checkAssets() {
            if(ASSETS.loaded === 2) {
                document.getElementById('screen-loading').classList.add('hidden');
                document.getElementById('screen-login').classList.remove('hidden');
            }
        }

        // Game State
        const gameState = {
            user: null,
            roomCode: null,
            isHost: false,
            players: {}, // Network players
            monsters: {}, // Network monsters
            particles: [],
            damageTexts: [],
            camera: { x: 0, y: 0 },
            mapSize: 3000,
            lastSync: 0,
            unsubPlayers: null,
            unsubChat: null,
            unsubMonsters: null
        };

        // Local Player Object
        const player = {
            id: null,
            name: 'Hero',
            charType: 'boy',
            x: 1500, y: 1500,
            width: 48, height: 48,
            speed: 4,
            hp: 100, maxHp: 100,
            level: 1, exp: 0, maxExp: 100,
            isAttacking: false,
            attackTimer: 0,
            direction: 1, // 1 right, -1 left
            skills: [
                { level: 1, cd: 0, maxCd: 60, name: 'Basic' },
                { level: 1, cd: 0, maxCd: 300, name: 'Skill 1' },
                { level: 1, cd: 0, maxCd: 600, name: 'Ultimate' }
            ]
        };

        // Input Handling
        const keys = { w: false, a: false, s: false, d: false, ' ': false, '1': false, '2': false, '3': false };
        let joystick = { active: false, dx: 0, dy: 0 };

        window.addEventListener('keydown', (e) => {
            if(document.activeElement === document.getElementById('chat-input')) {
                if(e.key === 'Enter') sendChat();
                return;
            }
            if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
            if(e.key === 'Enter') {
                document.getElementById('chat-input').focus();
            }
        });
        window.addEventListener('keyup', (e) => {
            if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false;
        });

        // Mobile Joystick Logic
        const joyZone = document.getElementById('joystick-zone');
        const joyKnob = document.getElementById('joystick-knob');
        let joyCenter = {x:0, y:0};
        
        joyZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = joyZone.getBoundingClientRect();
            joyCenter = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
            handleJoystick(e.touches[0]);
        }, {passive: false});
        
        joyZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleJoystick(e.touches[0]);
        }, {passive: false});
        
        joyZone.addEventListener('touchend', (e) => {
            e.preventDefault();
            joystick.active = false;
            joystick.dx = 0; joystick.dy = 0;
            joyKnob.style.transform = `translate(0px, 0px)`;
        });

        function handleJoystick(touch) {
            joystick.active = true;
            let dx = touch.clientX - joyCenter.x;
            let dy = touch.clientY - joyCenter.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 40;
            if(dist > maxDist) {
                dx = (dx/dist) * maxDist;
                dy = (dy/dist) * maxDist;
            }
            joyKnob.style.transform = `translate(${dx}px, ${dy}px)`;
            joystick.dx = dx / maxDist;
            joystick.dy = dy / maxDist;
        }

        document.getElementById('mobile-attack').addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys[' '] = true;
        });
        document.getElementById('mobile-attack').addEventListener('touchend', (e) => {
            e.preventDefault();
            keys[' '] = false;
        });

        // ==========================================
        // UI & LOBBY LOGIC
        // ==========================================
        
        // Character Selection
        document.querySelectorAll('.char-select').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('.char-select').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
                player.charType = el.getAttribute('data-char');
            });
        });

        // Auth
        document.getElementById('btn-login').addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch(err => alert("Login gagal: " + err.message));
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth);
            location.reload();
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                gameState.user = user;
                player.id = user.uid;
                document.getElementById('screen-login').classList.add('hidden');
                document.getElementById('screen-lobby').classList.remove('hidden');
                document.getElementById('input-username').value = user.displayName.split(' ')[0] || 'Player';
            } else {
                document.getElementById('screen-lobby').classList.add('hidden');
                if(ASSETS.loaded === 2) document.getElementById('screen-login').classList.remove('hidden');
            }
        });

        // Room Logic
        function generateRoomCode() {
            return 'DGN' + Math.floor(1000 + Math.random() * 9000);
        }

        document.getElementById('btn-create-room').addEventListener('click', async () => {
            const name = document.getElementById('input-username').value.trim();
            if(!name) return alert("Masukkan nama karakter!");
            player.name = name;
            
            const code = generateRoomCode();
            gameState.roomCode = code;
            gameState.isHost = true; // Creator handles monsters
            
            try {
                // Create room doc
                await setDoc(doc(db, "rooms", code), {
                    createdAt: serverTimestamp(),
                    host: player.id
                });
                joinGame(code);
                initMonsters(); // Host spawns initial monsters
            } catch (e) {
                console.error(e);
                alert("Gagal membuat room. Cek koneksi/config Firebase.");
            }
        });

        document.getElementById('btn-join-room').addEventListener('click', async () => {
            const name = document.getElementById('input-username').value.trim();
            if(!name) return alert("Masukkan nama karakter!");
            player.name = name;

            const code = document.getElementById('input-room-code').value.trim().toUpperCase();
            if(code.length < 5) return alert("Kode room tidak valid!");

            try {
                const roomSnap = await getDoc(doc(db, "rooms", code));
                if(roomSnap.exists()) {
                    gameState.roomCode = code;
                    joinGame(code);
                } else {
                    alert("Room tidak ditemukan!");
                }
            } catch (e) {
                console.error(e);
                alert("Gagal join room.");
            }
        });

        async function joinGame(code) {
            document.getElementById('screen-lobby').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('pointer-events-none');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('chat-container').classList.remove('hidden');
            document.getElementById('skills-container').classList.remove('hidden');
            
            // Setup HUD
            document.getElementById('hud-name').innerText = player.name;
            document.getElementById('hud-avatar').src = player.charType === 'boy' ? ASSETS.boy.src : ASSETS.girl.src;
            document.getElementById('hud-room-code').innerText = code;
            updateHUD();

            // Set Initial Player Data in Firestore
            await updateFirebasePlayer(true);

            // Listen to Players
            const playersRef = collection(db, "rooms", code, "players");
            gameState.unsubPlayers = onSnapshot(playersRef, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const data = change.doc.data();
                    if (change.type === "added" || change.type === "modified") {
                        if (change.doc.id !== player.id) {
                            if(!gameState.players[change.doc.id]) {
                                // New player joined
                                gameState.players[change.doc.id] = { ...data, renderX: data.x, renderY: data.y };
                                addSystemChat(`${data.name} telah bergabung.`);
                            } else {
                                // Update existing
                                const p = gameState.players[change.doc.id];
                                p.targetX = data.x;
                                p.targetY = data.y;
                                p.hp = data.hp;
                                p.maxHp = data.maxHp;
                                p.level = data.level;
                                p.direction = data.direction;
                                p.isAttacking = data.isAttacking;
                            }
                        }
                    }
                    if (change.type === "removed") {
                        if(gameState.players[change.doc.id]) {
                            addSystemChat(`${gameState.players[change.doc.id].name} keluar.`);
                            delete gameState.players[change.doc.id];
                        }
                    }
                });
            });

            // Listen to Chat
            const chatRef = query(collection(db, "rooms", code, "chat"), orderBy("time", "asc"), limit(50));
            gameState.unsubChat = onSnapshot(chatRef, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        displayChat(change.doc.data());
                    }
                });
            });

            // Listen to Monsters
            const monstersRef = collection(db, "rooms", code, "monsters");
            gameState.unsubMonsters = onSnapshot(monstersRef, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const data = change.doc.data();
                    if (change.type === "added" || change.type === "modified") {
                        if(!gameState.monsters[change.doc.id]) {
                            gameState.monsters[change.doc.id] = { ...data, renderX: data.x, renderY: data.y };
                        } else {
                            const m = gameState.monsters[change.doc.id];
                            m.targetX = data.x;
                            m.targetY = data.y;
                            m.hp = data.hp;
                            m.isDead = data.isDead;
                        }
                    }
                    if (change.type === "removed") {
                        delete gameState.monsters[change.doc.id];
                    }
                });
            });

            // Start Game Loop
            requestAnimationFrame(gameLoop);
        }

        // ==========================================
        // MULTIPLAYER SYNC & CHAT
        // ==========================================
        async function updateFirebasePlayer(force = false) {
            if(!gameState.roomCode) return;
            const now = Date.now();
            // Throttle updates to ~10 times per second to save Firestore quota, unless forced
            if (!force && now - gameState.lastSync < 100) return; 
            
            gameState.lastSync = now;
            try {
                await setDoc(doc(db, "rooms", gameState.roomCode, "players", player.id), {
                    name: player.name,
                    charType: player.charType,
                    x: Math.round(player.x),
                    y: Math.round(player.y),
                    hp: player.hp,
                    maxHp: player.maxHp,
                    level: player.level,
                    direction: player.direction,
                    isAttacking: player.isAttacking,
                    lastActive: serverTimestamp()
                }, { merge: true });
            } catch(e) { console.warn("Sync error", e); }
        }

        async function sendChat() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !gameState.roomCode) return;
            input.value = '';
            
            try {
                await addDoc(collection(db, "rooms", gameState.roomCode, "chat"), {
                    sender: player.name,
                    text: text,
                    time: serverTimestamp(),
                    type: 'user'
                });
            } catch(e) { console.warn("Chat error", e); }
        }

        async function addSystemChat(text) {
            if(!gameState.roomCode) return;
             try {
                await addDoc(collection(db, "rooms", gameState.roomCode, "chat"), {
                    sender: 'System',
                    text: text,
                    time: serverTimestamp(),
                    type: 'system'
                });
            } catch(e) {}
        }

        function displayChat(msg) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = 'mb-1';
            if(msg.type === 'system') {
                div.innerHTML = `<span class="text-yellow-400 italic">${msg.text}</span>`;
            } else {
                div.innerHTML = `<span class="text-blue-300">[${msg.sender}]</span>: <span class="text-white">${msg.text}</span>`;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // ==========================================
        // MONSTER LOGIC (Host Driven)
        // ==========================================
        async function initMonsters() {
            if(!gameState.isHost) return;
            // Spawn initial monsters
            for(let i=0; i<15; i++) {
                spawnMonster();
            }
            // Host AI Loop
            setInterval(hostMonsterAI, 500); // Run AI every 500ms
        }

        async function spawnMonster() {
            if(!gameState.roomCode) return;
            const level = Math.floor(Math.random() * 5) + 1; // Basic spawns
            const id = 'mob_' + Date.now() + Math.floor(Math.random()*1000);
            const m = {
                id: id,
                x: Math.random() * gameState.mapSize,
                y: Math.random() * gameState.mapSize,
                hp: 50 * level,
                maxHp: 50 * level,
                level: level,
                speed: 2 + (level*0.1),
                damage: 10 * level,
                isDead: false
            };
            try {
                await setDoc(doc(db, "rooms", gameState.roomCode, "monsters", id), m);
            } catch(e){}
        }

        async function hostMonsterAI() {
            if(!gameState.isHost || !gameState.roomCode) return;
            
            // Collect all targets (host + players)
            const targets = [{x: player.x, y: player.y, id: player.id}];
            for(let id in gameState.players) {
                targets.push({x: gameState.players[id].x, y: gameState.players[id].y, id: id});
            }

            for(let mId in gameState.monsters) {
                const mob = gameState.monsters[mId];
                if(mob.isDead) continue;

                // Find nearest target
                let nearest = null;
                let minDist = 400; // Aggro range

                targets.forEach(t => {
                    const dist = Math.hypot(t.x - mob.x, t.y - mob.y);
                    if(dist < minDist) { minDist = dist; nearest = t; }
                });

                if(nearest) {
                    if(minDist > 50) {
                        // Move towards
                        const angle = Math.atan2(nearest.y - mob.y, nearest.x - mob.x);
                        mob.x += Math.cos(angle) * mob.speed * 5; // *5 because runs every 500ms
                        mob.y += Math.sin(angle) * mob.speed * 5;
                        
                        // Update Firestore
                        updateDoc(doc(db, "rooms", gameState.roomCode, "monsters", mId), {
                            x: Math.round(mob.x), y: Math.round(mob.y)
                        }).catch(()=>{});
                    } else {
                        // Attack! (Simplified: just show effect, real damage calculated on client side for responsiveness)
                    }
                }
            }
        }

        // ==========================================
        // GAME LOOP & RENDERING
        // ==========================================
        let lastTime = performance.now();

        function gameLoop(currentTime) {
            const dt = (currentTime - lastTime) / 1000;
            lastTime = currentTime;

            update(dt);
            draw();

            if(player.hp > 0) requestAnimationFrame(gameLoop);
            else {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0,0,width,height);
                ctx.fillStyle = 'red';
                ctx.font = '40px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText("KAMU MATI", width/2, height/2);
                setTimeout(() => location.reload(), 3000);
            }
        }

        function update(dt) {
            // Movement
            let dx = 0, dy = 0;
            if(keys.w) dy -= 1;
            if(keys.s) dy += 1;
            if(keys.a) dx -= 1;
            if(keys.d) dx += 1;

            if(joystick.active) {
                dx = joystick.dx;
                dy = joystick.dy;
            }

            // Normalize diagonal speed
            if(dx !== 0 && dy !== 0 && !joystick.active) {
                const length = Math.sqrt(dx*dx + dy*dy);
                dx /= length; dy /= length;
            }

            if(dx !== 0) player.direction = dx > 0 ? 1 : -1;

            const oldX = player.x;
            const oldY = player.y;

            player.x += dx * player.speed * 60 * dt;
            player.y += dy * player.speed * 60 * dt;

            // Map Bounds
            player.x = Math.max(0, Math.min(gameState.mapSize, player.x));
            player.y = Math.max(0, Math.min(gameState.mapSize, player.y));

            // Camera follow
            gameState.camera.x = player.x - width / 2;
            gameState.camera.y = player.y - height / 2;

            // Sync if moved
            if(Math.abs(player.x - oldX) > 1 || Math.abs(player.y - oldY) > 1) {
                updateFirebasePlayer();
            }

            // Combat / Skills
            player.skills.forEach(s => { if(s.cd > 0) s.cd -= dt * 60; });
            
            if(keys[' '] || keys['1']) attemptAttack(0);
            if(keys['2']) attemptAttack(1);
            if(keys['3']) attemptAttack(2);

            // Interpolate other players
            for(let id in gameState.players) {
                const p = gameState.players[id];
                if(p.targetX !== undefined) {
                    p.renderX += (p.targetX - p.renderX) * 0.2;
                    p.renderY += (p.targetY - p.renderY) * 0.2;
                }
            }

            // Interpolate monsters
            for(let id in gameState.monsters) {
                const m = gameState.monsters[id];
                if(m.targetX !== undefined) {
                    m.renderX += (m.targetX - m.renderX) * 0.1;
                    m.renderY += (m.targetY - m.renderY) * 0.1;
                }
            }

            // Particles
            gameState.particles = gameState.particles.filter(p => {
                p.life -= dt;
                p.x += p.vx * dt * 60;
                p.y += p.vy * dt * 60;
                return p.life > 0;
            });

            // Damage Texts
            gameState.damageTexts = gameState.damageTexts.filter(t => {
                t.life -= dt;
                t.y -= 20 * dt;
                return t.life > 0;
            });

            updateSkillUI();
        }

        function attemptAttack(skillIndex) {
            const skill = player.skills[skillIndex];
            if(skill.cd > 0) return;

            player.isAttacking = true;
            skill.cd = skill.maxCd;
            updateFirebasePlayer(true); // Sync attack state immediately
            
            setTimeout(() => { 
                player.isAttacking = false; 
                updateFirebasePlayer(true);
            }, 200);

            // Create Attack Effect
            createEffect(player.x + (player.direction * 30), player.y, skillIndex);

            // Hit Detection (Auto Aim logic applied by hitting nearest in range)
            let hit = false;
            let range = skillIndex === 2 ? 150 : (skillIndex === 1 ? 100 : 60);
            let damage = player.level * 10 + (skill.level * 5) * (skillIndex + 1);

            for(let mId in gameState.monsters) {
                const mob = gameState.monsters[mId];
                if(mob.isDead) continue;
                
                const dist = Math.hypot(mob.x - player.x, mob.y - player.y);
                if(dist < range) {
                    // Hit!
                    applyDamageToMonster(mId, damage);
                    hit = true;
                    break; // Hit one per attack for basic, maybe all for AoE
                }
            }

            if(skillIndex === 2 && hit) {
                // AoE hits everything in range
                 for(let mId in gameState.monsters) {
                    const mob = gameState.monsters[mId];
                    if(!mob.isDead && Math.hypot(mob.x - player.x, mob.y - player.y) < range) {
                        applyDamageToMonster(mId, damage);
                    }
                 }
            }
        }

        function applyDamageToMonster(mId, damage) {
            const mob = gameState.monsters[mId];
            if(!mob || mob.isDead) return;

            mob.hp -= damage;
            addDamageText(mob.x, mob.y - 30, damage, 'white');
            createParticles(mob.x, mob.y, 'red');

            if(mob.hp <= 0) {
                mob.isDead = true;
                // Reward
                const expGain = mob.level * 20;
                addExp(expGain);
                addDamageText(player.x, player.y - 40, `+${expGain} EXP`, 'yellow');
                
                // Heal
                player.hp = Math.min(player.maxHp, player.hp + (mob.level * 5));
                addDamageText(player.x, player.y - 20, `+Heal`, 'green');
                updateHUD();

                // Delete from Firebase
                if(gameState.roomCode) {
                    deleteDoc(doc(db, "rooms", gameState.roomCode, "monsters", mId)).catch(()=>{});
                    // Respawn a new one after delay if host
                    if(gameState.isHost) setTimeout(spawnMonster, 3000);
                }
            } else {
                // Update HP in Firebase
                if(gameState.roomCode) {
                    updateDoc(doc(db, "rooms", gameState.roomCode, "monsters", mId), { hp: mob.hp }).catch(()=>{});
                }
            }
        }

        function addExp(amount) {
            player.exp += amount;
            if(player.exp >= player.maxExp) {
                player.level++;
                player.exp -= player.maxExp;
                player.maxExp = Math.floor(player.maxExp * 1.5);
                player.maxHp += 20;
                player.hp = player.maxHp;
                createParticles(player.x, player.y, 'gold', 30);
                addDamageText(player.x, player.y - 50, "LEVEL UP!", 'gold');
                document.getElementById('upgrade-panel').classList.remove('hidden');
                updateFirebasePlayer(true);
            }
            updateHUD();
        }

        window.game = {
            upgradeSkill: function(idx) {
                player.skills[idx].level++;
                player.skills[idx].maxCd *= 0.9; // Reduce CD
                document.getElementById('upgrade-panel').classList.add('hidden');
            }
        };

        // --- Visual Effects ---
        function createEffect(x, y, type) {
            let color = player.charType === 'boy' ? '#94a3b8' : '#c084fc'; // Sword slash vs Magic
            if(type === 1) color = '#3b82f6'; // Dash/Heal
            if(type === 2) color = '#fbbf24'; // Ult

            for(let i=0; i<10; i++) {
                gameState.particles.push({
                    x: x + (Math.random()*20-10), y: y + (Math.random()*20-10),
                    vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    life: 0.2 + Math.random()*0.2, color: color, size: Math.random()*5+2
                });
            }
        }

        function createParticles(x, y, color, count=5) {
            for(let i=0; i<count; i++) {
                gameState.particles.push({
                    x: x, y: y,
                    vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8,
                    life: 0.5, color: color, size: Math.random()*4+2
                });
            }
        }

        function addDamageText(x, y, text, color) {
            gameState.damageTexts.push({ x, y, text, color, life: 1 });
        }

        // --- Drawing ---
        function draw() {
            // Background (Grass)
            ctx.fillStyle = '#14532d'; // Dark green grass
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.translate(-gameState.camera.x, -gameState.camera.y);

            // Draw Grid/Pattern to simulate map
            ctx.strokeStyle = 'rgba(0,0,0,0.1)';
            ctx.lineWidth = 2;
            const tileSize = 100;
            const startX = Math.floor(gameState.camera.x / tileSize) * tileSize;
            const startY = Math.floor(gameState.camera.y / tileSize) * tileSize;
            
            for(let x = startX; x < startX + width + tileSize; x += tileSize) {
                for(let y = startY; y < startY + height + tileSize; y += tileSize) {
                    // Procedural decoration based on coordinates
                    const noise = Math.sin(x*0.01) * Math.cos(y*0.01);
                    if(noise > 0.8) {
                        ctx.fillStyle = '#475569'; // Rock
                        ctx.fillRect(x+20, y+20, 30, 30);
                    } else if (noise < -0.8) {
                        ctx.fillStyle = '#064e3b'; // Tree base
                        ctx.beginPath(); ctx.arc(x+50, y+50, 40, 0, Math.PI*2); ctx.fill();
                    } else if (Math.abs(noise) < 0.1) {
                        ctx.fillStyle = '#78350f'; // Dirt path
                        ctx.fillRect(x, y, tileSize, tileSize);
                    }
                    ctx.strokeRect(x, y, tileSize, tileSize);
                }
            }

            // Sort entities for Y-depth rendering
            const entities = [];
            entities.push({ type: 'player', obj: player, y: player.y });
            for(let id in gameState.players) entities.push({ type: 'other', obj: gameState.players[id], y: gameState.players[id].renderY });
            for(let id in gameState.monsters) {
                if(!gameState.monsters[id].isDead) entities.push({ type: 'monster', obj: gameState.monsters[id], y: gameState.monsters[id].renderY });
            }
            entities.sort((a, b) => a.y - b.y);

            // Draw Entities
            entities.forEach(e => {
                if(e.type === 'player') drawCharacter(e.obj, e.obj.x, e.obj.y, true);
                else if(e.type === 'other') drawCharacter(e.obj, e.obj.renderX, e.obj.renderY, false);
                else if(e.type === 'monster') drawMonster(e.obj);
            });

            // Draw Particles
            gameState.particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life * 2;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            // Draw Damage Texts
            ctx.font = 'bold 20px "VT323"';
            ctx.textAlign = 'center';
            gameState.damageTexts.forEach(t => {
                ctx.fillStyle = 'black';
                ctx.fillText(t.text, t.x+2, t.y+2);
                ctx.fillStyle = t.color;
                ctx.globalAlpha = t.life;
                ctx.fillText(t.text, t.x, t.y);
                ctx.globalAlpha = 1;
            });

            ctx.restore();
        }

        function drawCharacter(charObj, x, y, isLocal) {
            const img = charObj.charType === 'boy' ? ASSETS.boy : ASSETS.girl;
            const w = 64, h = 64; // Render size
            
            ctx.save();
            ctx.translate(x, y);
            
            // Name tag & Level
            ctx.font = '16px "VT323"';
            ctx.textAlign = 'center';
            ctx.fillStyle = isLocal ? '#fbbf24' : '#60a5fa';
            ctx.fillText(`Lv.${charObj.level||1} ${charObj.name}`, 0, -h/2 - 15);
            
            // HP Bar
            const hpPct = Math.max(0, (charObj.hp / (charObj.maxHp||100)));
            ctx.fillStyle = 'black'; ctx.fillRect(-20, -h/2 - 10, 40, 5);
            ctx.fillStyle = 'red'; ctx.fillRect(-20, -h/2 - 10, 40 * hpPct, 5);

            // Flip sprite based on direction
            if(charObj.direction === -1) { ctx.scale(-1, 1); }

            // Attack animation tilt
            if(charObj.isAttacking) { ctx.rotate(0.2); }

            // Draw Sprite (Center bottom origin)
            ctx.drawImage(img, -w/2, -h, w, h);

            // Weapon/Effect indicator if attacking
            if(charObj.isAttacking) {
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(w/2, -h/2, 20, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.restore();
        }

        function drawMonster(mob) {
            ctx.save();
            ctx.translate(mob.renderX, mob.renderY);
            
            // HP Bar
            const hpPct = Math.max(0, mob.hp / mob.maxHp);
            ctx.fillStyle = 'black'; ctx.fillRect(-20, -40, 40, 5);
            ctx.fillStyle = 'red'; ctx.fillRect(-20, -40, 40 * hpPct, 5);
            
            // Level
            ctx.font = '14px "VT323"'; ctx.textAlign = 'center'; ctx.fillStyle = '#ef4444';
            ctx.fillText(`Lv.${mob.level}`, 0, -45);

            // Simple Monster Shape (Slime/Skull)
            ctx.fillStyle = mob.level > 3 ? '#991b1b' : '#65a30d'; // Red if high level, green if low
            ctx.beginPath();
            ctx.arc(0, -15, 20 + (mob.level*2), 0, Math.PI, true); // Top dome
            ctx.lineTo(20+(mob.level*2), 0);
            ctx.lineTo(-20-(mob.level*2), 0);
            ctx.fill();

            // Eyes
            ctx.fillStyle = 'white';
            ctx.fillRect(-10, -20, 5, 5); ctx.fillRect(5, -20, 5, 5);
            ctx.fillStyle = 'black';
            ctx.fillRect(-8, -18, 2, 2); ctx.fillRect(7, -18, 2, 2);

            ctx.restore();
        }

        // --- UI Updates ---
        function updateHUD() {
            const hpPct = (player.hp / player.maxHp) * 100;
            document.getElementById('hud-hp-fill').style.width = `${hpPct}%`;
            document.getElementById('hud-hp-text').innerText = `${Math.floor(player.hp)}/${player.maxHp}`;

            const expPct = (player.exp / player.maxExp) * 100;
            document.getElementById('hud-exp-fill').style.width = `${expPct}%`;
            document.getElementById('hud-exp-text').innerText = `EXP: ${player.exp}/${player.maxExp}`;
            
            document.getElementById('hud-level').innerText = player.level;
        }

        function updateSkillUI() {
            for(let i=0; i<3; i++) {
                const s = player.skills[i];
                const pct = s.cd > 0 ? (s.cd / s.maxCd) * 100 : 0;
                document.getElementById(`cd-${i+1}`).style.height = `${pct}%`;
            }
        }

    </script>
</body>
